        .stat-card i{font-size:20px;color:#6366f1;}
        .stat-card span{display:block;font-size:18px;font-weight:700;}
        .personality-select,.user-name-input{width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:40px;color:white;margin:10px 0;}

        .action-buttons{display:flex;gap:10px;margin-top:10px;}
        .action-btn{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:40px;padding:10px;text-align:center;cursor:pointer;font-size:12px;}
        .version{text-align:center;font-size:10px;color:rgba(255,255,255,0.3);margin-top:20px;padding-top:15px;border-top:1px solid rgba(255,255,255,0.05);}
        .sidebar-left{background:rgba(10,10,15,0.6);backdrop-filter:blur(20px);border-radius:32px;padding:20px;border:1px solid rgba(255,255,255,0.08);}
        .section-title{font-size:14px;font-weight:600;color:rgba(255,255,255,0.7);margin-bottom:15px;}
        .model-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:12px 15px;margin-bottom:10px;cursor:pointer;transition:all 0.3s;}
        .model-card.active{border-color:#6366f1;background:rgba(99,102,241,0.15);}
        .model-name{display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;}
        .model-name i{color:#6366f1;}
        .model-desc{font-size:11px;color:rgba(255,255,255,0.5);margin-top:5px;}
        .chat-area{background:rgba(10,10,15,0.5);backdrop-filter:blur(20px);border-radius:32px;display:flex;flex-direction:column;height:70vh;border:1px solid rgba(255,255,255,0.08);overflow:hidden;}
        .chat-header{padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;}
        .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px;}

        .message-avatar{width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;}
        .message.user .message-avatar{background:linear-gradient(135deg,#10b981,#059669);}
        .message-content{background:rgba(255,255,255,0.05);border-radius:20px;padding:12px 16px;}
        .message.user .message-content{background:rgba(99,102,241,0.2);}
        .message-text{font-size:14px;line-height:1.5;word-break:break-word;}
        .message-time{font-size:9px;color:rgba(255,255,255,0.3);margin-top:6px;}
        .input-area{padding:15px 20px;border-top:1px solid rgba(255,255,255,0.05);}
        .input-wrapper{display:flex;gap:10px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:60px;padding:5px 5px 5px 18px;align-items:center;}
        .input-wrapper textarea{flex:1;background:transparent;border:none;padding:12px 0;color:white;font-family:'Cairo';font-size:14px;resize:none;}
        .input-wrapper textarea:focus{outline:none;}
        .action-buttons-group{display:flex;gap:8px;align-items:center;}
        .icon-btn{width:44px;height:44px;background:rgba(255,255,255,0.08);border:none;border-radius:50%;color:white;font-size:20px;cursor:pointer;}
        .icon-btn.camera{background:rgba(99,102,241,0.2);}
        .icon-btn.generate{background:rgba(139,92,246,0.2);}
        .icon-btn.mic{background:rgba(16,185,129,0.2);}
        .icon-btn.mic.recording{background:#ef4444;animation:pulseMic 1s infinite;}
        @keyframes pulseMic{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .send-btn{width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:50%;color:white;font-size:18px;cursor:pointer;}
        .image-preview{position:fixed;bottom:100px;left:20px;background:rgba(0,0,0,0.9);border-radius:20px;padding:8px;display:flex;gap:10px;z-index:1000;}
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);padding:10px 20px;border-radius:50px;color:white;font-size:13px;z-index:1002;animation:fadeOut 2s forwards;}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .typing-dots{display:flex;gap:6px;padding:8px 0;}
        .typing-dots span{width:8px;height:8px;background:#6366f1;border-radius:50%;animation:typing 1.4s infinite;}
        @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .main-content{display:grid;grid-template-columns:260px 1fr;gap:12px;}
        @media(max-width:1024px){.main-content{grid-template-columns:1fr}.sidebar-left{display:none}.message{max-width:95%}}

        .chat-viewer.active{display:flex;}
        .viewer-header{display:flex;justify-content:space-between;margin-bottom:20px;}
        .viewer-messages{flex:1;overflow-y:auto;background:rgba(255,255,255,0.05);border-radius:20px;padding:20px;}
        .viewer-message{margin-bottom:15px;padding:10px;border-radius:15px;}
        .viewer-message.user{background:rgba(99,102,241,0.2);text-align:right;}
        .viewer-message.bot{background:rgba(255,255,255,0.05);text-align:left;}
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon"><i class="fas fa-brain"></i></div><div class="logo-text"><h1>أبو راس <span class="badge">AI 6.0</span></h1><span>الذكاء الاصطناعي الأسطوري</span></div></div>

        <div class="sidebar-left">

            <div class="model-card" onclick="switchModel('llama')"><div class="model-name"><i class="fas fa-code"></i> Llama 3</div><div class="model-desc">مفتوح المصدر - قوي</div></div>
            <div class="model-card" onclick="switchModel('mixtral')"><div class="model-name"><i class="fas fa-bolt"></i> Mixtral 8x7B</div><div class="model-desc">سريع - فعال</div></div>

                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="اسأل عن أي شيء... (Enter للإرسال)" rows="1"></textarea>

                        <button class="icon-btn camera" onclick="openCamera()"><i class="fas fa-camera"></i></button>

                        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

    <div class="creator-card"><div class="creator-avatar"><i class="fas fa-robot"></i></div><h3>الذكاء الاصطناعي</h3><p>الإصدار 6.0 · الأسطوري</p></div>

    <input type="text" id="userNameInput" class="user-name-input" placeholder="أدخل اسمك">
    <button class="copy-btn" onclick="saveUserName()">💾 حفظ الاسم</button>
    <select id="personalitySelect" class="personality-select" onchange="changePersonality()"><option value="friend">👨‍👦 صديق</option><option value="mentor">🎓 مرشد</option><option value="doctor">👨‍⚕️ دكتور</option><option value="poet">📖 شاعر</option><option value="lawyer">⚖️ محامي</option></select>

    <button class="theme-toggle-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i> الوضع الليلي</button>
    <button class="whatsapp-number" onclick="openWhatsApp()"><i class="fab fa-whatsapp"></i> 0530708453</button>
    <button class="copy-btn" onclick="copyNumber()"><i class="fas fa-copy"></i> نسخ الرقم</button>
    <div class="action-buttons"><div class="action-btn" onclick="exportChat()"><i class="fas fa-download"></i> تصدير</div><div class="action-btn" onclick="clearChat()"><i class="fas fa-trash-alt"></i> مسح</div><div class="action-btn" onclick="shareApp()"><i class="fas fa-share-alt"></i> مشاركة</div></div>
    <div class="version"><i class="fas fa-heart" style="color:#ec4899;"></i> صنع بإبداع<br><i class="fas fa-copyright"></i> 2025 أبو راس AI</div>
</div>

// ==============================================

let aiMode = 'normal';

let conversationHistory = [];

let currentPersonality = 'friend';
let isRecording = false;
let recognition = null;
let currentImage = null;

// شخصيات البوت
const personalities = {
    friend: { name: 'صديق', prompt: 'أنت صديق المستخدم المقرب. تتحدث بالعامية الخليجية، أسلوبك حبي وأخوي.' },

    poet: { name: 'شاعر', prompt: 'أنت شاعر عربي. تتحدث بأسلوب شعري.' },
    lawyer: { name: 'محامي', prompt: 'أنت محامٍ خبير. أسلوبك قانوني دقيق.' }
};

// ==============================================
// إحصائيات الزوار
// ==============================================
let visitorStats = {
    totalVisitors: 0,
    dailyVisitors: {},
    devices: { mobile: 0, desktop: 0, tablet: 0 },
    browsers: { chrome: 0, firefox: 0, safari: 0, other: 0 },
    firstVisitDate: new Date().toISOString()
};

function initVisitorStats() {
    const saved = localStorage.getItem('abo_ras_visitor_stats');
    if(saved) {
        try { 
            const parsed = JSON.parse(saved);
            visitorStats = {
                totalVisitors: parsed.totalVisitors || 0,
                dailyVisitors: parsed.dailyVisitors || {},
                devices: parsed.devices || { mobile: 0, desktop: 0, tablet: 0 },
                browsers: parsed.browsers || { chrome: 0, firefox: 0, safari: 0, other: 0 },
                firstVisitDate: parsed.firstVisitDate || new Date().toISOString()
            };
        } catch(e) { resetVisitorStats(); }
    } else { resetVisitorStats(); }
    
    detectDevice();
    detectBrowser();
    
    if(!sessionStorage.getItem('visited')) {
        sessionStorage.setItem('visited', 'true');
        visitorStats.totalVisitors++;
        const today = new Date().toDateString();
        visitorStats.dailyVisitors[today] = (visitorStats.dailyVisitors[today] || 0) + 1;
        saveVisitorStats();
    }
    setInterval(updateSessionDisplay, 1000);
}

function resetVisitorStats() {
    visitorStats = {
        totalVisitors: 0,
        dailyVisitors: {},
        devices: { mobile: 0, desktop: 0, tablet: 0 },
        browsers: { chrome: 0, firefox: 0, safari: 0, other: 0 },
        firstVisitDate: new Date().toISOString()
    };
}

function detectDevice() {
    const ua = navigator.userAgent;
    if(/(tablet|ipad|playbook|silk)|(android(?!.*mobile))/i.test(ua)) visitorStats.devices.tablet++;
    else if(/Mobile|Android|iP(hone|od)|IEMobile|BlackBerry|Kindle/i.test(ua)) visitorStats.devices.mobile++;
    else visitorStats.devices.desktop++;
}

function detectBrowser() {
    const ua = navigator.userAgent;
    if(ua.includes('Chrome')) visitorStats.browsers.chrome++;
    else if(ua.includes('Firefox')) visitorStats.browsers.firefox++;
    else if(ua.includes('Safari') && !ua.includes('Chrome')) visitorStats.browsers.safari++;
    else visitorStats.browsers.other++;
}

function saveVisitorStats() { localStorage.setItem('abo_ras_visitor_stats', JSON.stringify(visitorStats)); }
function getTodayVisitors() { return visitorStats.dailyVisitors[new Date().toDateString()] || 0; }
function getFirstVisitDate() { return new Date(visitorStats.firstVisitDate).toLocaleDateString('ar-SA'); }
function updateSessionDisplay() {
    const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    const minutes = Math.floor(elapsed / 60), seconds = elapsed % 60;
    const elem = document.getElementById('sessionTimeStat');
    if(elem) elem.innerText = `${minutes}:${seconds.toString().padStart(2,'0')}`;
}

function updateChatsTable() {
    const tbody = document.getElementById('chatsTableBody');

    const search = document.getElementById('searchChat')?.value.toLowerCase() || '';
    const filtered = allChats.filter(c => (!search || c.userName?.toLowerCase().includes(search) || c.messages?.some(m=>m.content.toLowerCase().includes(search))));
    tbody.innerHTML = filtered.slice(0,50).map((c, idx) => `
        <tr>
            <td>${new Date(c.timestamp).toLocaleTimeString('ar-SA')}</td>
            <td>${c.userName || 'زائر'}${isBanned(c.userName) ? '<span class="banned-tag">محظور</span>' : ''}</td>
            <td>${c.messages?.length || 0}</td>
            <td>${c.messages?.[c.messages.length-1]?.content?.substring(0,30) || ''}</td>
            <td><div class="action-btns"><button class="action-btn-sm" onclick="viewChat(${allChats.indexOf(c)})">👁️</button><button class="action-btn-sm danger" onclick="deleteChat(${allChats.indexOf(c)})">🗑️</button></div></td>
        </tr>
    `).join('');
}

function updateUsersTable() {
    const tbody = document.getElementById('usersTableBody');
    if(!tbody) return;
    const userMap = new Map();
    allChats.forEach(c => {
        const name = c.userName || 'زائر';
        if(!userMap.has(name)) userMap.set(name, { name, messages: 0, lastActive: 0 });
        const user = userMap.get(name);
        user.messages += c.messages?.length || 0;
        if(c.timestamp > user.lastActive) user.lastActive = c.timestamp;
    });
    const users = Array.from(userMap.values());
    const search = document.getElementById('searchUser')?.value.toLowerCase() || '';
    const filtered = users.filter(u => u.name.toLowerCase().includes(search));
    tbody.innerHTML = filtered.map(u => `
        <tr>
            <td>${u.name}</td>
            <td>${u.messages}</td>
            <td>${new Date(u.lastActive).toLocaleString('ar-SA')}</td>
            <td>${isBanned(u.name) ? '<span class="status-badge status-offline">محظور</span>' : '<span class="status-badge status-online">نشط</span>'}</td>
            <td><div class="action-btns"><button class="action-btn-sm" onclick="viewUserChats('${u.name}')">📋</button><button class="action-btn-sm danger" onclick="banUser('${u.name}')">🚫 حظر</button><button class="action-btn-sm" onclick="unbanUser('${u.name}')">✅ فك</button></div></td>
        </tr>
    `).join('');
}

function handleCameraCapture(i) { if(i.files&&i.files[0]){ const r=new FileReader(); r.onload=e=>{ currentImage=e.target.result; showImagePreview(currentImage); addMessage('📸 تم رفع صورة','bot'); }; r.readAsDataURL(i.files[0]); } }
function handleImageUpload(i) { if(i.files&&i.files[0]){ const r=new FileReader(); r.onload=e=>{ currentImage=e.target.result; showImagePreview(currentImage); addMessage('🖼️ تم رفع صورة','bot'); }; r.readAsDataURL(i.files[0]); } }
function showImagePreview(img) { let p=document.querySelector('.image-preview'); if(!p){ p=document.createElement('div'); p.className='image-preview'; document.body.appendChild(p); } p.innerHTML=`<img src="${img}" style="width:50px;height:50px;border-radius:12px;"><button onclick="removeImage()" style="background:#ef4444;border:none;border-radius:50%;width:28px;height:28px;">✕</button>`; }
function removeImage() { currentImage=null; const p=document.querySelector('.image-preview'); if(p) p.remove(); showToast('🗑️ تم إزالة الصورة'); }
function generateImageFromInput() { const i=document.getElementById('userInput'); const p=i.value.trim(); if(!p){ showToast('🎨 اكتب وصف الصورة أولاً'); return; } showToast('🎨 جاري توليد الصورة...'); addMessage(`🎨 جاري توليد صورة من وصف: "${p}"`,'bot'); setTimeout(()=>{ addMessage(`✨ تم توليد الصورة بناءً على وصفك`,'bot'); i.value=''; },1500); }
function initVoiceRecognition(){ if('webkitSpeechRecognition' in window){ recognition=new webkitSpeechRecognition(); recognition.lang='ar-SA'; recognition.onresult=e=>{ document.getElementById('userInput').value=e.results[0][0].transcript; sendMessage(); stopRecording(); }; recognition.onerror=()=>stopRecording(); recognition.onend=()=>stopRecording(); } }
function toggleVoiceInput(){ if(!recognition) return; if(isRecording) stopRecording(); else startRecording(); }
function startRecording(){ try{ recognition.start(); isRecording=true; const b=document.getElementById('micBtn'); b.classList.add('recording'); b.innerHTML='<i class="fas fa-microphone-slash"></i>'; showToast('🎤 سجل الآن...'); }catch(e){} }
function stopRecording(){ try{ recognition.stop(); }catch(e){} isRecording=false; const b=document.getElementById('micBtn'); b.classList.remove('recording'); b.innerHTML='<i class="fas fa-microphone"></i>'; }
function showStats(){ addMessage(`📊 إحصائياتك\n💬 عدد الرسائل: ${conversationHistory.length}\n🎭 الوضع: ${aiMode==='pov'?'POV':'عادي'}\n👤 الشخصية: ${personalities[currentPersonality].name}`,'bot'); }

// ==============================================
// دالة الاتصال بالـ API - تم إصلاحها بالكامل
// ==============================================
async function sendMessage() {
    if(isBanned(userName)) { addMessage('🚫 حسابك محظور. تواصل مع الإدارة.','bot'); return; }
    const input = document.getElementById('userInput');
    const message = input.value.trim();
    if(!message) return;
    
    addMessage(message, 'user');
    input.value = '';
    conversationHistory.push({role:'user', content:message, time:Date.now()});
    showTypingIndicator();
    
    try {
        const response = await callAI(message);
        removeTypingIndicator();
        if(response) {
            addMessage(response, 'bot');
            conversationHistory.push({role:'assistant', content:response, time:Date.now()});
            saveCurrentChat();
        } else {
            addMessage('❌ عذراً، حدث خطأ. حاول مرة أخرى.', 'bot');
        }
    } catch(e) {
        removeTypingIndicator();
        addMessage('❌ حدث خطأ. حاول مرة أخرى.', 'bot');
    }
}

async function callAI(message) {
    try {
        const recent = conversationHistory.slice(-10);
        
        const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${OPENROUTER_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: currentModel,
                messages: [
                    { role: 'system', content: getSystemPrompt().substring(0, 1500) },
                    ...recent.map(msg => ({ role: msg.role, content: msg.content.substring(0, 1500) })),
                    { role: 'user', content: message.substring(0, 1500) }
                ],
                temperature: 0.7,
                max_tokens: 800
            })
        });
        
        if(!res.ok) {
            console.log('API Error:', res.status);
            return null;
        }
        
        const data = await res.json();
        return data.choices?.[0]?.message?.content;
        
    } catch(error) {
        console.log('API Error:', error);
        return null;
    }
}

function addMessage(text, sender) {
    const messagesDiv = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${sender}`;
    const time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
    messageDiv.innerHTML = `
        <div class="message-avatar"><i class="fas fa-${sender==='user'?'user':'robot'}"></i></div>
        <div class="message-content"><div class="message-text">${text.replace(/\n/g,'<br>')}</div><div class="message-time">${time}</div></div>
    `;
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    updateStatsCount();
}

function updateStatsCount() {
    const msgCount = document.getElementById('msgCount');
    if(msgCount) msgCount.innerText = conversationHistory.length;
    const memCount = document.getElementById('memoryCount');
    if(memCount) memCount.innerText = conversationHistory.length;
}

function showTypingIndicator() {
    const div = document.getElementById('chatMessages');
    const ind = document.createElement('div');
    ind.className = 'message bot typing-indicator';
    ind.id = 'typingIndicator';
    ind.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content"><div class="typing-dots"><span>.</span><span>.</span><span>.</span></div></div>`;
    div.appendChild(ind);
    div.scrollTop = div.scrollHeight;
}
function removeTypingIndicator() { document.getElementById('typingIndicator')?.remove(); }
function setupEventListeners() { document.getElementById('userInput').addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }); }
function switchModel(m){ const mod={gemini:'google/gemini-pro',llama:'meta-llama/llama-3-70b',mixtral:'mistralai/mixtral-8x7b'}; if(mod[m]){ currentModel=mod[m]; document.querySelectorAll('.model-card').forEach(c=>c.classList.remove('active')); event.currentTarget.classList.add('active'); addMessage(`🔄 تم التبديل إلى ${m.toUpperCase()}`,'bot'); } }
function toggleMenu(){ document.getElementById('sideMenu').classList.add('open'); document.getElementById('menuOverlay').classList.add('active'); }
function closeMenu(){ document.getElementById('sideMenu').classList.remove('open'); document.getElementById('menuOverlay').classList.remove('active'); }
function openWhatsApp(){ window.open('https://wa.me/966530708453','_blank'); }
function copyNumber(){ navigator.clipboard.writeText('0530708453'); showToast('✅ تم نسخ الرقم'); }
function showToast(msg){ const t=document.createElement('div'); t.className='toast'; t.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function exportChat(){ const d=JSON.stringify(conversationHistory); const b=new Blob([d],{type:'application/json'}); const u=URL.createObjectURL(b); const a=document.createElement('a'); a.href=u; a.download=`abo-ras-chat-${Date.now()}.json`; a.click(); URL.revokeObjectURL(u); showToast('📁 تم تصدير المحادثة'); }
function clearChat(){ if(confirm('⚠️ مسح كل المحادثات؟')){ conversationHistory=[]; document.getElementById('chatMessages').innerHTML=''; addMessage('🗑️ تم مسح المحادثة','bot'); showToast('🗑️ تم المسح'); } }
function shareApp(){ if(navigator.share) navigator.share({title:'أبو راس AI',text:'جرب الذكاء الاصطناعي!',url:window.location.href}); else copyNumber(); }

document.addEventListener('DOMContentLoaded',()=>{
    initVisitorStats();
    loadAllChats();
    loadBannedUsers();
    setupEventListeners();
    initVoiceRecognition();
    const n=localStorage.getItem('user_name'); if(n && !isBanned(n)){ userName=n; document.getElementById('userNameInput').value=n; document.getElementById('userNameDisplay').innerHTML=`<i class="fas fa-user"></i> ${n}`; }
    const t=localStorage.getItem('theme'); if(t==='light') document.body.classList.add('light-mode');
    const p=localStorage.getItem('personality'); if(p&&personalities[p]){ currentPersonality=p; document.getElementById('personalitySelect').value=p; }
    const m=localStorage.getItem('ai_mode'); if(m==='pov'||m==='normal'){ aiMode=m; updateModeUI(); }
    addMessage(botWelcomeMessage,'bot');
});
