<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="mobile-web-app-capable" content="yes">
    <title>أبو راس AI · الإصدار 5.0 الأسطوري</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s;
        }

        body.light-mode {
            background: #f5f5f7;
        }

        body.light-mode .header,
        body.light-mode .sidebar-left,
        body.light-mode .chat-area,
        body.light-mode .side-menu,
        body.light-mode .admin-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-color: rgba(0, 0, 0, 0.1);
        }

        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 40%, rgba(99,102,241,0.2) 0%, rgba(10,10,15,1) 80%);
            z-index: -2;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 12px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 10px 18px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            animation: pulseGlow 2s infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(99,102,241,0.3); }
            50% { box-shadow: 0 0 20px rgba(99,102,241,0.6); }
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text span {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
        }

        .badge {
            background: rgba(99,102,241,0.2);
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            color: #a5b4fc;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.03);
            padding: 8px 16px;
            border-radius: 40px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.2); }
        }

        .admin-icon {
            background: rgba(239, 68, 68, 0.2);
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-icon:hover {
            background: rgba(239, 68, 68, 0.4);
            transform: scale(1.02);
        }

        /* نافذة تسجيل الدخول */
        .login-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px;
            z-index: 2000;
            min-width: 320px;
            text-align: center;
            border: 1px solid #6366f1;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .login-modal input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            text-align: center;
        }

        .login-modal button {
            padding: 10px 20px;
            margin: 10px 5px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: #6366f1;
            color: white;
            font-weight: 600;
        }

        /* لوحة التحكم */
        .admin-panel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 550px;
            height: 100vh;
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(25px);
            z-index: 2001;
            transition: right 0.3s ease;
            padding: 20px;
            border-left: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }

        .admin-panel.open {
            right: 0;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .close-admin {
            width: 35px;
            height: 35px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .stats-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card-admin {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }

        .visitor-stats {
            background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.2));
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid rgba(99,102,241,0.3);
        }

        .visitor-number {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chat-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .chat-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chat-item:hover {
            background: rgba(99,102,241,0.2);
        }

        .chat-preview {
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            margin-top: 5px;
        }

        .chat-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 2002;
            display: none;
            flex-direction: column;
            padding: 20px;
        }

        .chat-viewer.active {
            display: flex;
        }

        .viewer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .viewer-messages {
            flex: 1;
            overflow-y: auto;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
        }

        .viewer-message {
            margin-bottom: 15px;
            padding: 10px;
            border-radius: 15px;
        }

        .viewer-message.user {
            background: rgba(99,102,241,0.2);
            text-align: right;
        }

        .viewer-message.bot {
            background: rgba(255,255,255,0.05);
            text-align: left;
        }

        .menu-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            cursor: pointer;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(99,102,241,0.4);
            border: none;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: rgba(10, 10, 15, 0.98);
            backdrop-filter: blur(25px);
            z-index: 1001;
            transition: right 0.3s ease;
            padding: 20px;
            border-left: 1px solid rgba(255,255,255,0.1);
            overflow-y: auto;
        }

        .side-menu.open {
            right: 0;
        }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .menu-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .close-menu {
            width: 35px;
            height: 35px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .creator-card {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .creator-avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 32px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            border-radius: 18px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
        }

        .stat-card i {
            font-size: 20px;
            color: #6366f1;
        }

        .stat-card span {
            display: block;
            font-size: 18px;
            font-weight: 700;
        }

        .personality-select, .user-name-input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            color: white;
            font-family: 'Cairo', sans-serif;
            margin: 10px 0;
        }

        .mode-toggle-btn, .theme-toggle-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 40px;
            padding: 12px;
            width: 100%;
            margin: 8px 0;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .whatsapp-number {
            background: linear-gradient(135deg, #25D366, #128C7E);
            border: none;
            border-radius: 40px;
            padding: 12px;
            width: 100%;
            margin-top: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .copy-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            color: rgba(255,255,255,0.8);
            cursor: pointer;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .action-btn {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 40px;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
        }

        .version {
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-left {
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.7);
            margin-bottom: 15px;
        }

        .model-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 12px 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .model-card.active {
            border-color: #6366f1;
            background: rgba(99,102,241,0.15);
        }

        .model-name {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14px;
        }

        .model-name i {
            color: #6366f1;
        }

        .model-desc {
            font-size: 11px;
            color: rgba(255,255,255,0.5);
            margin-top: 5px;
        }

        .chat-area {
            background: rgba(10, 10, 15, 0.5);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            height: 70vh;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .chat-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .message-content {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 12px 16px;
        }

        .message.user .message-content {
            background: rgba(99,102,241,0.2);
        }

        .message-text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message-time {
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            margin-top: 6px;
        }

        .input-area {
            padding: 15px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 5px 5px 5px 18px;
            align-items: center;
        }

        .input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            color: white;
            font-family: 'Cairo', sans-serif;
            font-size: 14px;
            resize: none;
        }

        .input-wrapper textarea:focus {
            outline: none;
        }

        .action-buttons-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.08);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .icon-btn.camera {
            background: rgba(99, 102, 241, 0.2);
        }

        .icon-btn.generate {
            background: rgba(139, 92, 246, 0.2);
        }

        .icon-btn.mic {
            background: rgba(16, 185, 129, 0.2);
        }

        .icon-btn.mic.recording {
            background: #ef4444;
            animation: pulseMic 1s infinite;
        }

        @keyframes pulseMic {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .send-btn {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .image-preview {
            position: fixed;
            bottom: 100px;
            left: 20px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 20px;
            padding: 8px;
            display: flex;
            gap: 10px;
            z-index: 1000;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            font-size: 13px;
            z-index: 1002;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .typing-dots {
            display: flex;
            gap: 6px;
            padding: 8px 0;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #6366f1;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        .main-content {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 12px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .sidebar-left {
                display: none;
            }
            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-brain"></i></div>
                <div class="logo-text">
                    <h1>أبو راس <span class="badge">AI 5.0</span></h1>
                    <span>الذكاء الاصطناعي الأسطوري</span>
                </div>
            </div>
            <div class="status">
                <div class="status-dot"></div>
                <span class="status-text">متصل</span>
            </div>
            <div class="admin-icon" onclick="showLoginModal()">
                <i class="fas fa-shield-alt"></i>
                <span style="font-size: 12px;">إدارة</span>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar-left">
                <div class="section-title"><i class="fas fa-microchip"></i> النماذج الذكية</div>
                <div class="model-card active" data-model="gemini" onclick="switchModel('gemini')">
                    <div class="model-name"><i class="fas fa-star"></i> Gemini Pro</div>
                    <div class="model-desc">مجاني - سريع - دقة عالية</div>
                </div>
                <div class="model-card" data-model="llama" onclick="switchModel('llama')">
                    <div class="model-name"><i class="fas fa-code"></i> Llama 3</div>
                    <div class="model-desc">مفتوح المصدر - قوي</div>
                </div>
                <div class="model-card" data-model="mixtral" onclick="switchModel('mixtral')">
                    <div class="model-name"><i class="fas fa-bolt"></i> Mixtral 8x7B</div>
                    <div class="model-desc">سريع - فعال</div>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <span><i class="fas fa-comment-dots"></i> محادثة ذكية</span>
                    <span><i class="fas fa-user" id="userNameDisplay"></i></span>
                </div>
                <div class="chat-messages" id="chatMessages"></div>

                <div class="input-area">
                    <div class="input-wrapper">
                        <textarea id="userInput" placeholder="اسأل عن أي شيء... (Enter للإرسال)" rows="1"></textarea>
                        <div class="action-buttons-group">
                            <button class="icon-btn camera" onclick="openCamera()" title="رفع صورة">
                                <i class="fas fa-camera"></i>
                            </button>
                            <button class="icon-btn generate" onclick="generateImageFromInput()" title="توليد صورة">
                                <i class="fas fa-plus-circle"></i>
                            </button>
                            <button class="icon-btn mic" id="micBtn" onclick="toggleVoiceInput()" title="إدخال صوتي">
                                <i class="fas fa-microphone"></i>
                            </button>
                            <button class="send-btn" onclick="sendMessage()" title="إرسال">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
    </button>

    <div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>

            totalVisitors: 0,

        // ==============================================
        // نظام إحصائيات الزوار
        // ==============================================
        function initVisitorStats() {
            const savedStats = localStorage.getItem('abo_ras_visitor_stats');
            if (savedStats) {
                try {
                    visitorStats = JSON.parse(savedStats);
                } catch(e) { resetVisitorStats(); }
            } else {
                resetVisitorStats();
            }
            
            // تسجيل زيارة جديدة
            recordVisit();
            
            // تحديث الإحصائيات كل ثانية
            setInterval(updateVisitorDisplay, 1000);
        }
        
        function resetVisitorStats() {
            const today = new Date().toDateString();
            visitorStats = {
                totalVisitors: 0,
                dailyVisitors: {},
                hourlyVisitors: {},
                firstVisitDate: new Date().toISOString(),
                lastReset: Date.now()
            };
            visitorStats.dailyVisitors[today] = 0;
            saveVisitorStats();
        }
        
        function recordVisit() {
            const now = new Date();
            const today = now.toDateString();
            const hour = now.getHours();
            
            // التحقق من عدم تكرار التسجيل لنفس الجلسة
            const sessionKey = `session_${Date.now()}`;
            if (!sessionStorage.getItem('visited')) {
                sessionStorage.setItem('visited', 'true');
                
                // زيادة إجمالي الزوار
                visitorStats.totalVisitors++;
                
                // زيادة الزوار اليوميين
                if (!visitorStats.dailyVisitors[today]) {
                    visitorStats.dailyVisitors[today] = 0;
                }
                visitorStats.dailyVisitors[today]++;
                
                // زيادة الزوار بالساعة
                const hourKey = `${today}_${hour}`;
                if (!visitorStats.hourlyVisitors[hourKey]) {
                    visitorStats.hourlyVisitors[hourKey] = 0;
                }
                visitorStats.hourlyVisitors[hourKey]++;
                
                saveVisitorStats();
            }
        }
        
        function saveVisitorStats() {
            localStorage.setItem('abo_ras_visitor_stats', JSON.stringify(visitorStats));
        }
        
        function getTodayVisitors() {
            const today = new Date().toDateString();
            return visitorStats.dailyVisitors[today] || 0;
        }
        
        function getCurrentHourVisitors() {
            const now = new Date();
            const hourKey = `${now.toDateString()}_${now.getHours()}`;
            return visitorStats.hourlyVisitors[hourKey] || 0;
        }
        
        function updateVisitorDisplay() {
            const todayVisitorsElem = document.getElementById('todayVisitors');
            const totalVisitorsElem = document.getElementById('totalVisitors');
            const hourlyVisitorsElem = document.getElementById('hourlyVisitors');
            const sessionTimeElem = document.getElementById('sessionTime');
            
            if (todayVisitorsElem) todayVisitorsElem.innerText = getTodayVisitors();
            if (totalVisitorsElem) totalVisitorsElem.innerText = visitorStats.totalVisitors;
            if (hourlyVisitorsElem) hourlyVisitorsElem.innerText = getCurrentHourVisitors();
            
            if (sessionTimeElem) {
                const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
                const minutes = Math.floor(elapsed / 60);
                const seconds = elapsed % 60;
                sessionTimeElem.innerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }
        
        function getFirstVisitDate() {
            return new Date(visitorStats.firstVisitDate).toLocaleDateString('ar-SA');
        }

            const interval = setInterval(() => {

        function initVoiceRecognition() {
            if ('webkitSpeechRecognition' in window) {
                recognition = new webkitSpeechRecognition();
                recognition.lang = 'ar-SA';
                recognition.onresult = (event) => {
                    document.getElementById('userInput').value = event.results[0][0].transcript;
                    sendMessage();
                    stopRecording();
                };
                recognition.onerror = () => stopRecording();
                recognition.onend = () => stopRecording();
            }
        }
        function toggleVoiceInput() { if (!recognition) return; if (isRecording) stopRecording(); else startRecording(); }
        function startRecording() {
            try { recognition.start(); isRecording = true; const micBtn = document.getElementById('micBtn'); micBtn.classList.add('recording'); micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>'; showToast('🎤 سجل الآن...'); } catch(e) {}
        }
        function stopRecording() {
            try { recognition.stop(); } catch(e) {}
            isRecording = false; const micBtn = document.getElementById('micBtn'); micBtn.classList.remove('recording'); micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
        }

        function startGame() {
            gameNumber = Math.floor(Math.random() * 100) + 1; gameAttempts = 0;
            const gameHtml = `<div class="game-modal" id="gameModal"><h3>🎮 لعبة خمن الرقم</h3><p>خمن رقم بين 1 و 100</p><input type="number" id="gameGuess" placeholder="أدخل رقمك"><div><button onclick="checkGuess()">🔍 خمن</button><button onclick="closeGame()">❌ إلغاء</button></div><p id="gameHint"></p></div>`;
            const modal = document.createElement('div'); modal.innerHTML = gameHtml; document.body.appendChild(modal); document.getElementById('gameGuess').focus();
        }
        function checkGuess() {
            const guess = parseInt(document.getElementById('gameGuess').value); gameAttempts++; const hint = document.getElementById('gameHint');
            if (isNaN(guess)) { hint.innerHTML = '⚠️ أدخل رقم صحيح'; return; }
            if (guess === gameNumber) { hint.innerHTML = `🎉 مبروك! خمنت من ${gameAttempts} محاولات!`; addMessage(`🎉 مبروك! خمنت الرقم ${gameNumber} من ${gameAttempts} محاولات!`, 'bot'); setTimeout(closeGame, 2000); }
            else if (guess < gameNumber) hint.innerHTML = '📈 الرقم أكبر';
            else hint.innerHTML = '📉 الرقم أصغر';
            document.getElementById('gameGuess').value = '';
        }
        function closeGame() { const modal = document.querySelector('.game-modal'); if (modal) modal.remove(); }

        function showStats() { addMessage(`📊 **إحصائياتك**\n\n💬 عدد الرسائل: ${conversationHistory.length}\n🎭 الوضع: ${aiMode === 'pov' ? 'POV' : 'عادي'}\n👤 الشخصية: ${personalities[currentPersonality].name}`, 'bot'); }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            conversationHistory.push({ role: 'user', content: message, time: Date.now() });
            showTypingIndicator();
            
            try {
                const response = await callAI(message);
                removeTypingIndicator();
                if (response) {
                    addMessage(response, 'bot');
                    conversationHistory.push({ role: 'assistant', content: response, time: Date.now() });
                    saveCurrentChat();
                } else {
                    addMessage('❌ عذراً، حدث خطأ. حاول مرة أخرى.', 'bot');
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage('❌ حدث خطأ.', 'bot');
            }
        }

        async function callAI(message) {
            try {
                const recentHistory = conversationHistory.slice(-10);
                const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${OPENROUTER_KEY}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [{ role: 'system', content: getSystemPrompt() }, ...recentHistory, { role: 'user', content: message }],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });
                if (!res.ok) return null;
                const data = await res.json();
                return data.choices?.[0]?.message?.content;
            } catch (error) { return null; }
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit' });
            messageDiv.innerHTML = `<div class="message-avatar"><i class="fas fa-${sender === 'user' ? 'user' : 'robot'}"></i></div><div class="message-content"><div class="message-text">${text.replace(/\n/g, '<br>')}</div><div class="message-time">${time}</div></div>`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            updateStatsCount();
        }

        function updateStatsCount() {
            const msgCount = document.getElementById('msgCount');
            if (msgCount) msgCount.innerText = conversationHistory.length;
            const memCount = document.getElementById('memoryCount');
            if (memCount) memCount.innerText = conversationHistory.length;
        }

        function showTypingIndicator() {
            const div = document.getElementById('chatMessages');
            const ind = document.createElement('div');
            ind.className = 'message bot typing-indicator';
            ind.id = 'typingIndicator';
            ind.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content"><div class="typing-dots"><span>.</span><span>.</span><span>.</span></div></div>`;
            div.appendChild(ind);
            div.scrollTop = div.scrollHeight;
        }
        function removeTypingIndicator() { const ind = document.getElementById('typingIndicator'); if (ind) ind.remove(); }

        function initializeParticles() {
            const container = document.getElementById('particles');
            if (!container) return;
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.style.cssText = `position:absolute;width:${Math.random()*4+1}px;height:${Math.random()*4+1}px;background:rgba(99,102,241,${Math.random()*0.3});border-radius:50%;left:${Math.random()*100}%;bottom:-10px;animation:floatParticle ${Math.random()*20+10}s linear infinite;`;
                container.appendChild(p);
            }
        }

        function setupEventListeners() {
            const input = document.getElementById('userInput');
            input.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        }

        function switchModel(model) {
            const models = { 'gemini': 'google/gemini-pro', 'llama': 'meta-llama/llama-3-70b', 'mixtral': 'mistralai/mixtral-8x7b' };
            if (models[model]) {
                currentModel = models[model];
                document.querySelectorAll('.model-card').forEach(c => c.classList.remove('active'));
                event.currentTarget.classList.add('active');
                addMessage(`🔄 تم التبديل إلى ${model.toUpperCase()}`, 'bot');
            }
        }

        function toggleMenu() { document.getElementById('sideMenu').classList.add('open'); document.getElementById('menuOverlay').classList.add('active'); }
        function closeMenu() { document.getElementById('sideMenu').classList.remove('open'); document.getElementById('menuOverlay').classList.remove('active'); }
        function openWhatsApp() { window.open('https://wa.me/966530708453', '_blank'); }
        function copyNumber() { navigator.clipboard.writeText('0530708453'); showToast('✅ تم نسخ الرقم'); }
        function showToast(message) { const toast = document.createElement('div'); toast.className = 'toast'; toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }
        function exportChat() { const data = JSON.stringify(conversationHistory); const blob = new Blob([data], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `abo-ras-chat-${Date.now()}.json`; a.click(); URL.revokeObjectURL(url); showToast('📁 تم تصدير المحادثة'); }
        function clearChat() { if (confirm('⚠️ مسح كل المحادثات؟')) { conversationHistory = []; document.getElementById('chatMessages').innerHTML = ''; addMessage('🗑️ تم مسح المحادثة', 'bot'); showToast('🗑️ تم المسح'); } }
        function shareApp() { if (navigator.share) navigator.share({ title: 'أبو راس AI', text: 'جرب الذكاء الاصطناعي!', url: window.location.href }); else copyNumber(); }

        // التحميل
        document.addEventListener('DOMContentLoaded', () => {
            initVisitorStats();
            loadAllChats();
            initializeParticles();
            setupEventListeners();
            initVoiceRecognition();
            
            const savedName = localStorage.getItem('user_name');
            if (savedName) { userName = savedName; document.getElementById('userNameInput').value = userName; document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${userName}`; }
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') document.body.classList.add('light-mode');
            const savedPersonality = localStorage.getItem('personality');
            if (savedPersonality && personalities[savedPersonality]) { currentPersonality = savedPersonality; document.getElementById('personalitySelect').value = currentPersonality; }
            const savedMode = localStorage.getItem('ai_mode');
            if (savedMode === 'pov' || savedMode === 'normal') { aiMode = savedMode; updateModeUI(); }
            
            addMessage('🌟 مرحباً! أنا أبو راس، الذكاء الاصطناعي الأسطوري. اسألني عن أي شيء!', 'bot');
        });

        // ربط الدوال
        window.sendMessage = sendMessage;
        window.switchModel = switchModel;
        window.toggleMode = toggleMode;
        window.toggleMenu = toggleMenu;
        window.closeMenu = closeMenu;
        window.openWhatsApp = openWhatsApp;
        window.copyNumber = copyNumber;
        window.exportChat = exportChat;
        window.clearChat = clearChat;
        window.shareApp = shareApp;
        window.saveUserName = saveUserName;
        window.changePersonality = changePersonality;
        window.toggleTheme = toggleTheme;
        window.showStats = showStats;
        window.startGame = startGame;
        window.checkGuess = checkGuess;
        window.closeGame = closeGame;
        window.toggleVoiceInput = toggleVoiceInput;
        window.openCamera = openCamera;
        window.handleCameraCapture = handleCameraCapture;
        window.handleImageUpload = handleImageUpload;
        window.removeImage = removeImage;
        window.generateImageFromInput = generateImageFromInput;
        window.showLoginModal = showLoginModal;
        window.loginAdmin = loginAdmin;
        window.closeLoginModal = closeLoginModal;
        window.closeAdminPanel = closeAdminPanel;
        window.viewChat = viewChat;
        window.closeChatViewer = closeChatViewer;
        window.exportAllChats = exportAllChats;
        window.clearAllChats = clearAllChats;

        const style = document.createElement('style');
        style.textContent = `@keyframes floatParticle { to { transform: translateY(-100vh) rotate(360deg); } }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
