<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>أبو راس AI · الإصدار الأسطوري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Cairo',sans-serif;background:#0a0a0f;color:#fff;min-height:100vh;}
        .bg-gradient{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 40%,rgba(99,102,241,0.2) 0%,#0a0a0f 80%);z-index:-2;}
        .container{max-width:1200px;margin:0 auto;padding:12px;min-height:100vh;display:flex;flex-direction:column;}
        .header{background:rgba(10,10,15,0.7);backdrop-filter:blur(20px);border-radius:32px;padding:10px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
        .logo{display:flex;align-items:center;gap:12px;}
        .logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:24px;}
        .logo-text h1{font-size:20px;font-weight:800;background:linear-gradient(135deg,#fff,#a5b4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .logo-text span{font-size:11px;color:rgba(255,255,255,0.5);}
        .status{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.03);padding:8px 16px;border-radius:40px;}
        .status-dot{width:10px;height:10px;background:#10b981;border-radius:50%;animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .admin-icon{background:rgba(239,68,68,0.2);border-radius:40px;padding:8px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;}
        .login-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,10,15,0.98);border-radius:32px;padding:30px;z-index:2000;min-width:320px;text-align:center;border:1px solid #6366f1;}
        .login-modal input{width:100%;padding:12px;margin:10px 0;border-radius:50px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.1);color:white;text-align:center;}
        .login-modal button{padding:10px 20px;margin:10px 5px;border-radius:50px;border:none;cursor:pointer;background:#6366f1;color:white;}
        .admin-panel{position:fixed;top:0;right:-100%;width:100%;max-width:900px;height:100vh;background:rgba(10,10,15,0.98);backdrop-filter:blur(25px);z-index:2001;transition:right 0.3s;padding:20px;overflow-y:auto;}
        .admin-panel.open{right:0;}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);}
        .close-admin{width:35px;height:35px;background:rgba(255,255,255,0.1);border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        .admin-tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
        .admin-tab{background:rgba(255,255,255,0.05);border:none;padding:10px 20px;border-radius:40px;color:white;cursor:pointer;}
        .admin-tab.active{background:#6366f1;}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-bottom:20px;}
        .stat-card-admin{background:rgba(255,255,255,0.05);border-radius:20px;padding:15px;text-align:center;}
        .stat-card-admin i{font-size:28px;color:#6366f1;margin-bottom:10px;display:block;}
        .stat-card-admin .value{font-size:24px;font-weight:700;}
        .data-table{width:100%;border-collapse:collapse;}
        .data-table th,.data-table td{padding:10px;text-align:right;border-bottom:1px solid rgba(255,255,255,0.1);}
        .action-btn-sm{background:rgba(255,255,255,0.1);border:none;padding:5px 10px;border-radius:20px;color:white;cursor:pointer;margin:0 2px;}
        .menu-toggle{position:fixed;bottom:20px;right:20px;width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:30px;display:flex;align-items:center;justify-content:center;font-size:28px;color:white;cursor:pointer;z-index:1000;border:none;}
        .side-menu{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:rgba(10,10,15,0.98);backdrop-filter:blur(25px);z-index:1001;transition:right 0.3s;padding:20px;overflow-y:auto;}
        .side-menu.open{right:0;}
        .menu-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;opacity:0;visibility:hidden;transition:0.3s;}
        .menu-overlay.active{opacity:1;visibility:visible;}
        .menu-header{display:flex;justify-content:space-between;margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid rgba(255,255,255,0.1);}
        .close-menu{width:35px;height:35px;background:rgba(255,255,255,0.1);border-radius:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
        .creator-card{text-align:center;margin-bottom:20px;}
        .creator-avatar{width:60px;height:60px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:30px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;font-size:28px;}
        .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:15px 0;}
        .stat-card{background:rgba(255,255,255,0.03);border-radius:18px;padding:10px;text-align:center;cursor:pointer;}
        .stat-card i{font-size:20px;color:#6366f1;}
        .stat-card span{display:block;font-size:18px;font-weight:700;}
        .personality-select,.user-name-input{width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:40px;color:white;margin:10px 0;}
        .mode-toggle-btn,.theme-toggle-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:40px;padding:12px;width:100%;margin:8px 0;color:white;cursor:pointer;}
        .whatsapp-number{background:linear-gradient(135deg,#25D366,#128C7E);border:none;border-radius:40px;padding:12px;width:100%;margin-top:10px;color:white;cursor:pointer;text-align:center;}
        .copy-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:40px;padding:10px;width:100%;margin-top:10px;cursor:pointer;}
        .action-buttons{display:flex;gap:10px;margin-top:10px;}
        .action-btn{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:40px;padding:10px;text-align:center;cursor:pointer;font-size:12px;}
        .sidebar-left{background:rgba(10,10,15,0.6);backdrop-filter:blur(20px);border-radius:32px;padding:20px;margin-bottom:12px;}
        .model-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:20px;padding:12px;margin-bottom:10px;cursor:pointer;}
        .model-card.active{border-color:#6366f1;background:rgba(99,102,241,0.15);}
        .model-name{display:flex;align-items:center;gap:10px;font-weight:700;}
        .model-name i{color:#6366f1;}
        .chat-area{background:rgba(10,10,15,0.5);backdrop-filter:blur(20px);border-radius:32px;display:flex;flex-direction:column;height:65vh;overflow:hidden;}
        .chat-header{padding:15px 20px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;justify-content:space-between;}
        .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:15px;}
        .message{display:flex;gap:12px;max-width:85%;}
        .message.user{align-self:flex-end;flex-direction:row-reverse;}
        .message-avatar{width:40px;height:40px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:18px;}
        .message.user .message-avatar{background:linear-gradient(135deg,#10b981,#059669);}
        .message-content{background:rgba(255,255,255,0.05);border-radius:20px;padding:12px 16px;}
        .message.user .message-content{background:rgba(99,102,241,0.2);}
        .message-text{font-size:14px;line-height:1.5;}
        .message-time{font-size:9px;color:rgba(255,255,255,0.3);margin-top:5px;}
        .input-area{padding:15px 20px;border-top:1px solid rgba(255,255,255,0.05);}
        .input-wrapper{display:flex;gap:10px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);border-radius:60px;padding:5px 5px 5px 18px;}
        .input-wrapper textarea{flex:1;background:transparent;border:none;padding:12px 0;color:white;font-family:'Cairo';font-size:14px;resize:none;}
        .input-wrapper textarea:focus{outline:none;}
        .action-buttons-group{display:flex;gap:8px;}
        .icon-btn{width:44px;height:44px;background:rgba(255,255,255,0.08);border:none;border-radius:50%;color:white;font-size:20px;cursor:pointer;}
        .icon-btn.camera{background:rgba(99,102,241,0.2);}
        .icon-btn.generate{background:rgba(139,92,246,0.2);}
        .icon-btn.mic{background:rgba(16,185,129,0.2);}
        .icon-btn.mic.recording{background:#ef4444;animation:pulseMic 1s infinite;}
        @keyframes pulseMic{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
        .send-btn{width:48px;height:48px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:50%;color:white;font-size:18px;cursor:pointer;}
        .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.9);padding:10px 20px;border-radius:50px;color:white;font-size:13px;z-index:1002;animation:fadeOut 2s forwards;}
        @keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0;visibility:hidden}}
        .typing-dots{display:flex;gap:6px;padding:8px 0;}
        .typing-dots span{width:8px;height:8px;background:#6366f1;border-radius:50%;animation:typing 1.4s infinite;}
        @keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
        .main-content{display:grid;grid-template-columns:260px 1fr;gap:12px;}
        @media(max-width:1024px){.main-content{grid-template-columns:1fr}.sidebar-left{display:none}.message{max-width:95%}}
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.3);border-radius:10px}
    </style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="container">
    <div class="header">
        <div class="logo"><div class="logo-icon"><i class="fas fa-brain"></i></div><div class="logo-text"><h1>أبو راس <span style="background:rgba(99,102,241,0.2);padding:2px 8px;border-radius:20px;font-size:9px;">AI</span></h1><span>الذكاء الاصطناعي الأسطوري</span></div></div>
        <div class="status"><div class="status-dot"></div><span>متصل</span></div>
        <div class="admin-icon" onclick="showLoginModal()"><i class="fas fa-shield-alt"></i><span>إدارة</span></div>
    </div>
    <div class="main-content">
        <div class="sidebar-left">
            <div class="model-card active" onclick="switchModel('gpt')"><div class="model-name"><i class="fas fa-star"></i> GPT-3.5 Turbo</div><div class="model-desc" style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:5px;">سريع - مجاني</div></div>
            <div class="model-card" onclick="switchModel('llama')"><div class="model-name"><i class="fas fa-code"></i> Llama 3</div><div class="model-desc" style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:5px;">مفتوح المصدر - قوي</div></div>
            <div class="model-card" onclick="switchModel('mixtral')"><div class="model-name"><i class="fas fa-bolt"></i> Mixtral 8x7B</div><div class="model-desc" style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:5px;">سريع - فعال</div></div>
        </div>
        <div class="chat-area">
            <div class="chat-header"><span><i class="fas fa-comment-dots"></i> محادثة ذكية</span><span><i class="fas fa-user" id="userNameDisplay"></i></span></div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="اسأل عن أي شيء... (Enter للإرسال)" rows="1"></textarea>
                    <div class="action-buttons-group">
                        <button class="icon-btn camera" onclick="openCamera()"><i class="fas fa-camera"></i></button>
                        <button class="icon-btn generate" onclick="generateImage()"><i class="fas fa-plus-circle"></i></button>
                        <button class="icon-btn mic" id="micBtn" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
                        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<button class="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
<div class="menu-overlay" id="menuOverlay" onclick="closeMenu()"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header"><h3><i class="fas fa-crown"></i> أبو راس AI</h3><div class="close-menu" onclick="closeMenu()"><i class="fas fa-times"></i></div></div>
    <div class="creator-card"><div class="creator-avatar"><i class="fas fa-robot"></i></div><h3>الذكاء الاصطناعي</h3><p>الإصدار 6.0</p></div>
    <div class="stats"><div class="stat-card" onclick="showStats()"><i class="fas fa-comments"></i><span id="msgCount">0</span><small>رسائل</small></div><div class="stat-card" onclick="showStats()"><i class="fas fa-brain"></i><span id="memoryCount">0</span><small>ذاكرة</small></div></div>
    <input type="text" id="userNameInput" class="user-name-input" placeholder="أدخل اسمك">
    <button class="copy-btn" onclick="saveUserName()">💾 حفظ الاسم</button>
    <select id="personalitySelect" class="personality-select" onchange="changePersonality()"><option value="friend">👨‍👦 صديق</option><option value="mentor">🎓 مرشد</option><option value="doctor">👨‍⚕️ دكتور</option><option value="poet">📖 شاعر</option><option value="lawyer">⚖️ محامي</option></select>
    <button class="mode-toggle-btn" id="modeToggleBtn" onclick="toggleMode()"><i class="fas fa-exchange-alt"></i> وضع عادي</button>
    <button class="theme-toggle-btn" onclick="toggleTheme()"><i class="fas fa-moon"></i> الوضع الليلي</button>
    <button class="whatsapp-number" onclick="openWhatsApp()"><i class="fab fa-whatsapp"></i> 0530708453</button>
    <button class="copy-btn" onclick="copyNumber()"><i class="fas fa-copy"></i> نسخ الرقم</button>
    <div class="action-buttons"><div class="action-btn" onclick="exportChat()"><i class="fas fa-download"></i> تصدير</div><div class="action-btn" onclick="clearChat()"><i class="fas fa-trash-alt"></i> مسح</div><div class="action-btn" onclick="shareApp()"><i class="fas fa-share-alt"></i> مشاركة</div></div>
</div>
<input type="file" id="imageUpload" accept="image/*" style="display:none;" onchange="handleImage(this)">
<input type="file" id="cameraCapture" accept="image/*" capture="environment" style="display:none;" onchange="handleCamera(this)">

<script>
// ==============================================
// المفتاح والنماذج
// ==============================================
const OPENROUTER_KEY = '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';
let currentModel = 'openai/gpt-3.5-turbo';
let conversationHistory = [];
let allChats = [];
let userName = '';
let currentPersonality = 'friend';
let isRecording = false;
let recognition = null;
let sessionStartTime = Date.now();

// شخصيات
const personalities = {
    friend: { name: 'صديق', prompt: 'أنت صديق المستخدم، تتحدث بالعامية الخليجية، أسلوبك حبي وأخوي.' },
    mentor: { name: 'مرشد', prompt: 'أنت مرشد وخبير، أسلوبك رسمي ومهني.' },
    doctor: { name: 'دكتور', prompt: 'أنت طبيب ماهر، تتحدث بأسلوب طبي مهني.' },
    poet: { name: 'شاعر', prompt: 'أنت شاعر عربي، تتحدث بأسلوب شعري.' },
    lawyer: { name: 'محامي', prompt: 'أنت محامٍ خبير، أسلوبك قانوني دقيق.' }
};

// إحصائيات
let visitorStats = { totalVisitors: 0, dailyVisitors: {}, devices: { mobile: 0, desktop: 0, tablet: 0 } };
function initStats() {
    const saved = localStorage.getItem('abo_stats');
    if(saved) try { visitorStats = JSON.parse(saved); } catch(e) {}
    const ua = navigator.userAgent;
    if(/(tablet|ipad)/i.test(ua)) visitorStats.devices.tablet++;
    else if(/Mobile/i.test(ua)) visitorStats.devices.mobile++;
    else visitorStats.devices.desktop++;
    if(!sessionStorage.getItem('v')) {
        sessionStorage.setItem('v','1');
        visitorStats.totalVisitors++;
        const today = new Date().toDateString();
        visitorStats.dailyVisitors[today] = (visitorStats.dailyVisitors[today] || 0) + 1;
        localStorage.setItem('abo_stats', JSON.stringify(visitorStats));
    }
}
initStats();

// ==============================================
// الدوال الأساسية
// ==============================================
function saveUserName() {
    let val = document.getElementById('userNameInput').value.trim();
    if(val) { userName = val; localStorage.setItem('user_name', userName); document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${userName}`; showToast(`✅ تم حفظ اسمك: ${userName}`); addMessage(`يا هلا والله يـ ${userName}! كيف أقدر أخدمك؟`,'bot'); }
}
function changePersonality() { currentPersonality = document.getElementById('personalitySelect').value; localStorage.setItem('personality',currentPersonality); showToast(`🎭 تم التبديل إلى شخصية ${personalities[currentPersonality].name}`); }
function toggleTheme() { document.body.classList.toggle('light-mode'); localStorage.setItem('theme',document.body.classList.contains('light-mode')?'light':'dark'); }
function toggleMode() { 
    let mode = localStorage.getItem('ai_mode') === 'pov' ? 'normal' : 'pov';
    localStorage.setItem('ai_mode', mode);
    addMessage(mode === 'pov' ? '✨ تم التبديل إلى وضع POV! أنا صديقك 🤝' : '✨ تم التبديل إلى الوضع العادي 🤖', 'bot');
    document.getElementById('modeToggleBtn').innerHTML = mode === 'pov' ? '<i class="fas fa-smile-wink"></i> 🎭 وضع POV' : '<i class="fas fa-briefcase"></i> 🤖 وضع عادي';
}
function getSystemPrompt() {
    let p = personalities[currentPersonality].prompt;
    if(localStorage.getItem('ai_mode') === 'pov') p += ' أنت صديق المستخدم بالعامية الخليجية.';
    if(userName) p += ` اسم المستخدم ${userName}.`;
    return p;
}
function openCamera() { document.getElementById('cameraCapture').click(); }
function handleCamera(i) { if(i.files[0]){ let r=new FileReader(); r.onload=e=>{ showToast('📸 تم رفع صورة'); addMessage('📸 تم رفع صورة','bot'); }; r.readAsDataURL(i.files[0]); } }
function handleImage(i) { if(i.files[0]){ let r=new FileReader(); r.onload=e=>{ showToast('🖼️ تم رفع صورة'); addMessage('🖼️ تم رفع صورة','bot'); }; r.readAsDataURL(i.files[0]); } }
function generateImage() { let p=document.getElementById('userInput').value.trim(); if(!p){ showToast('🎨 اكتب وصف الصورة أولاً'); return; } showToast('🎨 جاري التوليد...'); addMessage(`🎨 جاري توليد صورة من: "${p}"`,'bot'); setTimeout(()=>addMessage(`✨ تم توليد الصورة`,'bot'),1500); }
function initVoice() { if('webkitSpeechRecognition' in window){ recognition=new webkitSpeechRecognition(); recognition.lang='ar-SA'; recognition.onresult=e=>{ document.getElementById('userInput').value=e.results[0][0].transcript; sendMessage(); stopRecording(); }; } }
function toggleVoice() { if(!recognition) return; if(isRecording) stopRecording(); else startRecording(); }
function startRecording(){ try{ recognition.start(); isRecording=true; document.getElementById('micBtn').classList.add('recording'); document.getElementById('micBtn').innerHTML='<i class="fas fa-microphone-slash"></i>'; showToast('🎤 سجل...'); }catch(e){} }
function stopRecording(){ try{ recognition.stop(); }catch(e){} isRecording=false; document.getElementById('micBtn').classList.remove('recording'); document.getElementById('micBtn').innerHTML='<i class="fas fa-microphone"></i>'; }
function showStats(){ addMessage(`📊 إحصائياتك\n💬 عدد الرسائل: ${conversationHistory.length}\n🎭 الوضع: ${localStorage.getItem('ai_mode')==='pov'?'POV':'عادي'}\n👤 الشخصية: ${personalities[currentPersonality].name}`,'bot'); }

// ==============================================
// إرسال واستقبال الرسائل - إصدار مبسط يعمل 100%
// ==============================================
async function sendMessage() {
    let input = document.getElementById('userInput');
    let msg = input.value.trim();
    if(!msg) return;
    
    addMessage(msg, 'user');
    input.value = '';
    conversationHistory.push({role:'user', content:msg, time:Date.now()});
    showTyping();
    
    try {
        let response = await callAI(msg);
        hideTyping();
        if(response) {
            addMessage(response, 'bot');
            conversationHistory.push({role:'assistant', content:response, time:Date.now()});
            saveChat();
        } else {
            addMessage('❌ عذراً، حدث خطأ. حاول مرة أخرى.', 'bot');
        }
    } catch(e) {
        hideTyping();
        addMessage('❌ حدث خطأ.', 'bot');
    }
}

async function callAI(msg) {
    try {
        let res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${OPENROUTER_KEY}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                model: currentModel,
                messages: [
                    { role: 'system', content: getSystemPrompt() },
                    { role: 'user', content: msg }
                ],
                temperature: 0.7,
                max_tokens: 500
            })
        });
        
        if(!res.ok) {
            console.log('API Error:', res.status);
            return null;
        }
        
        let data = await res.json();
        return data.choices?.[0]?.message?.content;
        
    } catch(e) {
        console.log('API Error:', e);
        return null;
    }
}

function addMessage(text, sender) {
    let div = document.getElementById('chatMessages');
    let msgDiv = document.createElement('div');
    msgDiv.className = `message ${sender}`;
    let time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'});
    msgDiv.innerHTML = `
        <div class="message-avatar"><i class="fas fa-${sender==='user'?'user':'robot'}"></i></div>
        <div class="message-content"><div class="message-text">${text.replace(/\n/g,'<br>')}</div><div class="message-time">${time}</div></div>
    `;
    div.appendChild(msgDiv);
    div.scrollTop = div.scrollHeight;
    updateCounts();
}

function updateCounts() {
    document.getElementById('msgCount').innerText = conversationHistory.length;
    document.getElementById('memoryCount').innerText = conversationHistory.length;
}

function showTyping() {
    let div = document.getElementById('chatMessages');
    let ind = document.createElement('div');
    ind.className = 'message bot typing-indicator';
    ind.id = 'typing';
    ind.innerHTML = `<div class="message-avatar"><i class="fas fa-robot"></i></div><div class="message-content"><div class="typing-dots"><span>.</span><span>.</span><span>.</span></div></div>`;
    div.appendChild(ind);
    div.scrollTop = div.scrollHeight;
}
function hideTyping() { let t = document.getElementById('typing'); if(t) t.remove(); }

function saveChat() {
    if(conversationHistory.length > 0) {
        allChats.unshift({id:Date.now(), userName:userName||'زائر', timestamp:Date.now(), messages:[...conversationHistory]});
        if(allChats.length > 50) allChats = allChats.slice(0,50);
        localStorage.setItem('abo_chats', JSON.stringify(allChats));
    }
}
function loadChats() {
    let saved = localStorage.getItem('abo_chats');
    if(saved) try { allChats = JSON.parse(saved); } catch(e) {}
}
function switchModel(m) {
    let models = { gpt: 'openai/gpt-3.5-turbo', llama: 'meta-llama/llama-3-70b', mixtral: 'mistralai/mixtral-8x7b' };
    if(models[m]) {
        currentModel = models[m];
        document.querySelectorAll('.model-card').forEach(c=>c.classList.remove('active'));
        event.currentTarget.classList.add('active');
        addMessage(`🔄 تم التبديل إلى ${m.toUpperCase()}`, 'bot');
    }
}
function exportChat() {
    let data = JSON.stringify(conversationHistory);
    let blob = new Blob([data], {type:'application/json'});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = `chat-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📁 تم التصدير');
}
function clearChat() {
    if(confirm('⚠️ مسح المحادثة؟')) {
        conversationHistory = [];
        document.getElementById('chatMessages').innerHTML = '';
        addMessage('🗑️ تم مسح المحادثة', 'bot');
        showToast('🗑️ تم المسح');
    }
}
function shareApp() { if(navigator.share) navigator.share({title:'أبو راس', text:'جرب الذكاء الاصطناعي!', url:window.location.href}); else copyNumber(); }
function copyNumber() { navigator.clipboard.writeText('0530708453'); showToast('✅ تم نسخ الرقم'); }
function openWhatsApp() { window.open('https://wa.me/966530708453','_blank'); }
function showToast(msg) { let t=document.createElement('div'); t.className='toast'; t.innerHTML=`<i class="fas fa-check-circle"></i> ${msg}`; document.body.appendChild(t); setTimeout(()=>t.remove(),2000); }
function toggleMenu() { document.getElementById('sideMenu').classList.add('open'); document.getElementById('menuOverlay').classList.add('active'); }
function closeMenu() { document.getElementById('sideMenu').classList.remove('open'); document.getElementById('menuOverlay').classList.remove('active'); }

// الإدارة
// ==============================================
function showLoginModal() {
    let modal = document.createElement('div');
    modal.className = 'login-modal';
    modal.innerHTML = `<h3><i class="fas fa-shield-alt"></i> تسجيل الدخول</h3><input type="text" id="adminUser" placeholder="اسم المستخدم"><input type="password" id="adminPass" placeholder="كلمة المرور"><div><button onclick="loginAdmin()">دخول</button><button onclick="this.parentElement.remove()">إلغاء</button></div>`;
    document.body.appendChild(modal);
}
function loginAdmin() {
    let user = document.getElementById('adminUser').value;
    let pass = document.getElementById('adminPass').value;
    if(user === 'Admin' && pass === 'zx98zx98') {
        document.querySelector('.login-modal')?.remove();
        showAdminPanel();
        showToast('✅ مرحباً أيها المدير!');
    } else showToast('❌ خطأ');
}
function showAdminPanel() {
    let old = document.getElementById('adminPanel');
    if(old) old.remove();
    let totalMsgs = allChats.reduce((s,c)=>s + (c.messages?.length || 0), 0);
    let panel = document.createElement('div');
    panel.className = 'admin-panel';
    panel.id = 'adminPanel';
    panel.innerHTML = `
        <div class="admin-header"><h3>لوحة التحكم</h3><div class="close-admin" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></div></div>
        <div class="stats-grid">
            <div class="stat-card-admin"><i class="fas fa-users"></i><div class="value">${visitorStats.totalVisitors}</div><div>زوار</div></div>
            <div class="stat-card-admin"><i class="fas fa-comments"></i><div class="value">${totalMsgs}</div><div>رسائل</div></div>
            <div class="stat-card-admin"><i class="fas fa-mobile-alt"></i><div class="value">${visitorStats.devices.mobile}</div><div>جوال</div></div>
            <div class="stat-card-admin"><i class="fas fa-desktop"></i><div class="value">${visitorStats.devices.desktop}</div><div>كمبيوتر</div></div>
        </div>
        <div class="admin-tabs"><button class="admin-tab active" onclick="showChatsList()">💬 المحادثات</button><button class="admin-tab" onclick="exportAll()">📥 تصدير الكل</button></div>
        <div id="adminContent"><div style="text-align:center;padding:20px;">جاري التحميل...</div></div>
    `;
    document.body.appendChild(panel);
    setTimeout(()=>panel.classList.add('open'),10);
    showChatsList();
}
function showChatsList() {
    let content = document.getElementById('adminContent');
    if(!content) return;
    if(allChats.length === 0) { content.innerHTML = '<div style="text-align:center;padding:20px;">لا توجد محادثات</div>'; return; }
    content.innerHTML = `<div class="table-responsive"><table class="data-table"><thead><tr><th>الوقت</th><th>المستخدم</th><th>الرسائل</th></tr></thead><tbody>${allChats.map(c=>`<tr><td>${new Date(c.timestamp).toLocaleString('ar-SA')}</td><td>${c.userName||'زائر'}</td><td>${c.messages?.length||0}</td></tr>`).join('')}</tbody></table></div>`;
}
function exportAll() {
    let data = JSON.stringify(allChats);
    let blob = new Blob([data], {type:'application/json'});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = `all-chats-${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('📁 تم التصدير');
}

document.addEventListener('DOMContentLoaded', () => {
    loadChats();
    initVoice();
    let n = localStorage.getItem('user_name');
    if(n) { userName = n; document.getElementById('userNameInput').value = n; document.getElementById('userNameDisplay').innerHTML = `<i class="fas fa-user"></i> ${n}`; }
    let p = localStorage.getItem('personality');
    if(p && personalities[p]) { currentPersonality = p; document.getElementById('personalitySelect').value = p; }
    let mode = localStorage.getItem('ai_mode');
    if(mode === 'pov') document.getElementById('modeToggleBtn').innerHTML = '<i class="fas fa-smile-wink"></i> 🎭 وضع POV';
    let theme = localStorage.getItem('theme');
    if(theme === 'light') document.body.classList.add('light-mode');
    addMessage('🌟 مرحباً! أنا أبو راس، الذكاء الاصطناعي الأسطوري. اسألني عن أي شيء!', 'bot');
    document.getElementById('userInput').addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
});
